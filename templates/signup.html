{% extends "base.html" %}
{% block title %}Sign Up — Budget Bites Pune{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <a href="{{ url_for('index') }}" class="logo-text">Budget <span>Bites</span> Pune</a>
    </div>
    <h1 class="auth-title display">Join Us</h1>
    <p class="auth-sub">Create your free account to save favourites and leave reviews</p>

    <form method="POST" action="{{ url_for('signup') }}">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" required placeholder="punefoodie"
               value="{{ username if username is defined else '' }}" minlength="3" />
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" required placeholder="you@example.com"
               value="{{ email if email is defined else '' }}" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="At least 6 characters" minlength="6" />
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" name="confirm_password" required placeholder="Repeat password" />
      </div>
      <button type="submit" class="btn btn-gold form-full" style="margin-top: 0.75rem;">Create Account</button>
    </form>

    <div class="auth-switch">
      Already have an account? <a href="{{ url_for('login') }}">Log in</a>
    </div>
  </div>
</div>
{% endblock %}
