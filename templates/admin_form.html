{% extends "base.html" %}
{% block title %}{{ action }} Restaurant — Admin{% endblock %}

{% block content %}
<div style="padding-top: 5.5rem; background: var(--bg-2); border-bottom: 1px solid var(--border); padding-bottom: 3rem;">
  <div class="container">
    <a href="{{ url_for('admin_dashboard') }}" style="color: var(--text-muted); font-size: 0.82rem; letter-spacing: 0.1em; display: flex; align-items: center; gap: 0.4rem; margin-bottom: 1rem;">← Back to Dashboard</a>
    <span class="subtitle">Admin</span>
    <h1 class="display display-lg" style="margin-top: 0.5rem;">{{ action }} Restaurant</h1>
  </div>
</div>

<div class="section">
  <div class="container">
    <div style="max-width: 760px;">
      <div style="background: var(--bg-3); border: 1px solid var(--border); border-radius: var(--radius); padding: 2.5rem;">
        <form method="POST">
          <div class="grid-2" style="gap: 1.25rem;">
            <div class="form-group">
              <label>Restaurant Name *</label>
              <input type="text" name="name" required value="{{ restaurant.name if restaurant else '' }}" />
            </div>
            <div class="form-group">
              <label>Cuisine *</label>
              <input type="text" name="cuisine" required placeholder="e.g. South Indian, Continental" value="{{ restaurant.cuisine if restaurant else '' }}" />
            </div>
          </div>

          <div class="form-group">
            <label>Description</label>
            <textarea name="description" rows="4" style="width: 100%; resize: vertical;">{{ restaurant.description if restaurant else '' }}</textarea>
          </div>

          <div class="grid-2" style="gap: 1.25rem;">
            <div class="form-group">
              <label>Full Address *</label>
              <input type="text" name="location" required value="{{ restaurant.location if restaurant else '' }}" />
            </div>
            <div class="form-group">
              <label>Area *</label>
              <input type="text" name="area" required placeholder="e.g. Koregaon Park" value="{{ restaurant.area if restaurant else '' }}" />
            </div>
          </div>

          <div class="grid-2" style="gap: 1.25rem;">
            <div class="form-group">
              <label>Rating (0–5)</label>
              <input type="number" name="rating" min="0" max="5" step="0.1" value="{{ restaurant.rating if restaurant else '4.0' }}" />
            </div>
            <div class="form-group">
              <label>Avg Price for 2 (₹) *</label>
              <input type="number" name="avg_price_for_two" id="avg_price_for_two" required min="0" value="{{ restaurant.avg_price_for_two if restaurant else '' }}" />
            </div>
          </div>

          <div class="form-group">
            <label>Image URL (Unsplash or direct link)</label>
            <input type="text" name="image_url" placeholder="https://images.unsplash.com/..." value="{{ restaurant.image_url if restaurant else '' }}" />
          </div>

          <div class="grid-2" style="gap: 1.25rem;">
            <div class="form-group">
              <label>Opening Hours</label>
              <input type="text" name="opening_hours" placeholder="e.g. 11:00 AM – 11:00 PM" value="{{ restaurant.opening_hours if restaurant else '' }}" />
            </div>
            <div class="form-group">
              <label>Phone</label>
              <input type="text" name="phone" placeholder="020-XXXXXXXX" value="{{ restaurant.phone if restaurant else '' }}" />
            </div>
          </div>

          <div class="form-group" style="display: flex; align-items: center; gap: 0.75rem;">
            <input type="checkbox" name="is_featured" id="is_featured" style="width: auto;"
                   {% if restaurant and restaurant.is_featured %}checked{% endif %} />
            <label for="is_featured" style="text-transform: none; letter-spacing: 0; font-size: 0.9rem; cursor: pointer;">Mark as Featured Restaurant</label>
          </div>

          <div style="display: flex; gap: 1rem; margin-top: 1rem;">
            <button type="submit" class="btn btn-gold">{{ action }} Restaurant</button>
            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
