{% extends "base.html" %}
{% block title %}Login — Budget Bites Pune{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <a href="{{ url_for('index') }}" class="logo-text">Budget <span>Bites</span> Pune</a>
    </div>
    <h1 class="auth-title display">Welcome Back</h1>
    <p class="auth-sub">Log in to discover Pune's best bites</p>

    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" required placeholder="you@example.com"
               value="{{ request.form.get('email', '') }}" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="••••••••" />
      </div>
      <button type="submit" class="btn btn-gold form-full" style="margin-top: 0.75rem;">Log In</button>
    </form>

    <div class="auth-switch">
      Don't have an account? <a href="{{ url_for('signup') }}">Sign up free</a>
    </div>

    <div style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border); text-align: center;">
      <p style="font-size: 0.78rem; color: var(--text-muted);">Demo Admin: admin@budgetbites.com / admin123</p>
    </div>
  </div>
</div>
{% endblock %}
